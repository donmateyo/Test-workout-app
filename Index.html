<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>STKB Muscle Gain Tracker</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f78166;
    --accent2: #2ea043;
    --accent3: #58a6ff;
    --danger: #f85149;
    --radius: 12px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    overscroll-behavior-y: none;
  }
  #app { max-width: 900px; margin: 0 auto; padding: 12px; padding-bottom: 120px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 4px 12px; flex-wrap: wrap; gap: 8px;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  header .sub { font-size: 0.8rem; color: var(--muted); }

  /* Progress bar */
  .progress-wrap { margin: 8px 0 16px; }
  .progress-bar {
    height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3));
    transition: width 0.5s ease; width: 0%;
  }
  .progress-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* Week tabs */
  .week-tabs {
    display: flex; gap: 6px; overflow-x: auto; padding: 4px 0 12px;
    scrollbar-width: thin;
  }
  .week-tab {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 99px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .week-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .week-tab .check { margin-left: 4px; }

  /* Day cards */
  .day-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .day-card {
    padding: 14px 10px; border-radius: var(--radius);
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .day-card:hover { border-color: var(--accent3); }
  .day-card.active { border-color: var(--accent); background: var(--surface2); }
  .day-card .day-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .day-card .day-name { font-size: 0.95rem; font-weight: 600; margin-top: 2px; }
  .day-card .day-status { font-size: 0.7rem; margin-top: 4px; color: var(--accent2); }

  /* Workout view */
  .workout-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  }
  .workout-header h2 { font-size: 1.1rem; color: var(--accent3); }
  .workout-header .meta { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .workout-header .focus { display: inline-block; padding: 2px 8px; border-radius: 99px; background: var(--surface2); font-size: 0.7rem; margin-top: 8px; color: var(--accent); }

  /* Section */
  .section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
  }
  .section h3 {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .section h3 .badge {
    background: var(--accent3); color: #0d1117; padding: 1px 7px; border-radius: 99px;
    font-size: 0.65rem; font-weight: 700;
  }

  /* Exercise item */
  .exercise {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .exercise:last-child { border-bottom: none; }
  .exercise-checkbox {
    flex: 0 0 22px; width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; margin-top: 1px;
  }
  .exercise.done .exercise-checkbox { background: var(--accent2); border-color: var(--accent2); }
  .exercise.done .exercise-checkbox::after { content: "✓"; color: #fff; font-size: 0.8rem; font-weight: 700; }
  .exercise-content { flex: 1; }
  .exercise-name { font-size: 0.9rem; font-weight: 600; }
  .exercise.done .exercise-name { text-decoration: line-through; color: var(--muted); }
  .exercise-detail { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .exercise .timer-btn {
    flex: 0 0 auto; padding: 4px 10px; font-size: 0.72rem; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--accent3);
    cursor: pointer; font-weight: 600;
  }

  /* Timers */
  .timer-dock {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--surface); border-top: 1px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    max-height: 50vh; overflow-y: auto;
  }
  .timer-dock.hidden { display: none; }
  .timer-dock-inner { max-width: 900px; margin: 0 auto; padding: 12px; }
  .timer-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .timer-row:last-child { border-bottom: none; }
  .timer-label { font-size: 0.8rem; color: var(--muted); flex: 0 0 auto; }
  .timer-display { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); flex: 1; text-align: center; }
  .timer-display.work { color: var(--accent2); }
  .timer-display.rest { color: var(--danger); }
  .timer-controls { display: flex; gap: 6px; flex: 0 0 auto; }
  .timer-controls button {
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 0.8rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .timer-controls button:hover { border-color: var(--accent3); }
  .timer-controls button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .timer-controls button.primary.running { background: var(--danger); border-color: var(--danger); }

  .emom-setup { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  .emom-setup label { font-size: 0.75rem; color: var(--muted); }
  .emom-setup input {
    width: 60px; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 0.9rem; text-align: center;
  }
  .emom-round-info { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* Workout timer */
  .workout-timer-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 99;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;
    max-width: 900px; margin: 0 auto; transform: translateX(-50%); left: 50%;
  }
  .workout-timer-bar.hidden { display: none; }
  .workout-timer-bar .wt-label { font-size: 0.7rem; color: var(--muted); }
  .workout-timer-bar .wt-time { font-size: 1.1rem; font-weight: 700; color: var(--accent3); font-variant-numeric: tabular-nums; }
  .workout-timer-bar button { font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; }

  /* Buttons */
  .btn {
    padding: 10px 18px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent3); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.complete { background: var(--accent2); border-color: var(--accent2); color: #fff; width: 100%; padding: 14px; font-size: 1rem; margin-top: 12px; }
  .btn.danger { color: var(--danger); }

  .actions { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty h2 { color: var(--text); margin-bottom: 8px; }

  /* Notes */
  .notes-box { background: var(--surface2); border-radius: 8px; padding: 10px; font-size: 0.8rem; color: var(--muted); margin-top: 8px; line-height: 1.6; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; max-width: 400px; width: 100%; text-align: center;
  }
  .modal h2 { color: var(--accent2); margin-bottom: 8px; }
  .modal p { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; }
  .modal .btn { width: 100%; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.1rem; }
    .timer-display { font-size: 1.3rem; }
  }
</style>
</head>

// ============================================================
// STATE MANAGEMENT
// ============================================================
const STORAGE_KEY = "stkb_muscle_gain_progress_v1";
let state = {
  currentWeek: 0,
  currentDay: null,
  completed: {}, // {weekIdx_dayIdx: true}
  exercises: {}, // {weekIdx_dayIdx_exIdx: true}
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = { ...state, ...JSON.parse(saved) };
  } catch (e) {}
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getTotalWorkouts() {
  return PROGRAM.reduce((sum, w) => sum + w.days.length, 0);
}
function getCompletedCount() {
  return Object.keys(state.completed).length;
}
function dayKey(w, d) { return `${w}_${d}`; }
function exKey(w, d, s, e) { return `${w}_${d}_${s}_${e}`; }

function isDayComplete(w, d) {
  return !!state.completed[dayKey(w, d)];
}

function isWorkoutFullyChecked(w, d) {
  const day = PROGRAM[w].days[d];
  let total = 0, done = 0;
  day.sections.forEach((sec, si) => {
    sec.exercises.forEach((ex, ei) => {
      total++;
      if (state.exercises[exKey(w, d, si, ei)]) done++;
    });
  });
  return total > 0 && done === total;
}

// ============================================================
// RENDERING
// ============================================================
const app = document.getElementById("app");
const weekTabs = document.getElementById("week-tabs");
const dayGrid = document.getElementById("day-grid");
const workoutView = document.getElementById("workout-view");

function renderProgress() {
  const completed = getCompletedCount();
  const total = getTotalWorkouts();
  const pct = total > 0 ? (completed / total) * 100 : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = `${completed} of ${total} workouts completed`;
}

function renderWeekTabs() {
  weekTabs.innerHTML = "";
  PROGRAM.forEach((w, i) => {
    const tab = document.createElement("div");
    tab.className = "week-tab" + (i === state.currentWeek ? " active" : "");
    const dayCount = w.days.length;
    const completedDays = w.days.filter((_, di) => isDayComplete(i, di)).length;
    tab.innerHTML = `Week ${w.week}${completedDays === dayCount ? ' ✓' : ''}`;
    tab.onclick = () => {
      state.currentWeek = i;
      state.currentDay = null;
      saveState();
      renderAll();
    };
    weekTabs.appendChild(tab);
  });
}

function renderDayGrid() {
  dayGrid.innerHTML = "";
  const w = PROGRAM[state.currentWeek];
  w.days.forEach((day, di) => {
    const card = document.createElement("div");
    card.className = "day-card" + (di === state.currentDay ? " active" : "");
    const complete = isDayComplete(state.currentWeek, di);
    const fullyChecked = isWorkoutFullyChecked(state.currentWeek, di);
    card.innerHTML = `
      <div class="day-label">${w.title.split("—")[0].trim()}</div>
      <div class="day-name">${day.name.split("—")[0].trim()}</div>
      <div class="day-status">${complete ? '✓ Complete' : fullyChecked ? 'Ready to finish' : ''}</div>
    `;
    card.onclick = () => {
      state.currentDay = di;
      saveState();
      renderAll();
      startWorkoutTimer();
    };
    dayGrid.appendChild(card);
  });
}

function renderWorkout() {
  workoutView.innerHTML = "";
  if (state.currentDay === null) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = `
      <h2>${PROGRAM[state.currentWeek].title}</h2>
      <p>Select a day above to begin your workout.</p>
      <div class="notes-box">Focus: ${PROGRAM[state.currentWeek].focus}<br><br>
      <strong>Program Notes:</strong><br>
      • Rest is always as needed — if not timed sets, use HR and start when ~60-65% max.<br>
      • Day 4 in most weeks is an accessory day (Pullups, Dips, Biceps, Calves).<br>
      • Warm-up: Shoulder CARs, Hip Mobility, Stick Mobility before every session.<br>
      • Cooldown: Stretch, Prone Deep Breathing 5 min, Foam Roll after every session.
      </div>
    `;
    workoutView.appendChild(empty);
    return;
  }

  const w = PROGRAM[state.currentWeek];
  const day = w.days[state.currentDay];

  const header = document.createElement("div");
  header.className = "workout-header";
  header.innerHTML = `
    <h2>${day.name}</h2>
    <div class="meta">Week ${w.week} • ${w.title}</div>
    <div class="focus">${w.focus}</div>
  `;
  workoutView.appendChild(header);

  day.sections.forEach((sec, si) => {
    const section = document.createElement("div");
    section.className = "section";
    let badgeHtml = sec.badge ? `<span class="badge">${sec.badge}</span>` : "";
    section.innerHTML = `<h3>${sec.title} ${badgeHtml}</h3>`;
    const list = document.createElement("div");

    sec.exercises.forEach((ex, ei) => {
      const key = exKey(state.currentWeek, state.currentDay, si, ei);
      const done = !!state.exercises[key];
      const item = document.createElement("div");
      item.className = "exercise" + (done ? " done" : "");

      let timerBtn = "";
      if (ex.timer) {
        timerBtn = `<button class="timer-btn" data-timer='${JSON.stringify(ex.timer)}'>⏱ Timer</button>`;
      }

      item.innerHTML = `
        <div class="exercise-checkbox"></div>
        <div class="exercise-content">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-detail">${ex.detail}</div>
        </div>
        ${timerBtn}
      `;

      item.querySelector(".exercise-checkbox").parentElement.addEventListener("click", (e) => {
        if (e.target.classList.contains("timer-btn")) return;
        state.exercises[key] = !state.exercises[key];
        saveState();
        renderWorkout();
        renderDayGrid();
      });

      const tBtn = item.querySelector(".timer-btn");
      if (tBtn) {
        tBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const timerData = JSON.parse(tBtn.getAttribute("data-timer"));
          openTimer(timerData, ex.name);
        });
      }

      list.appendChild(item);
    });
    section.appendChild(list);
    workoutView.appendChild(section);
  });

  // Complete workout button
  const allDone = isWorkoutFullyChecked(state.currentWeek, state.currentDay);
  const completeBtn = document.createElement("button");
  completeBtn.className = "btn complete";
  if (isDayComplete(state.currentWeek, state.currentDay)) {
    completeBtn.textContent = "✓ Workout Completed — Click to Undo";
    completeBtn.style.background = "var(--surface2)";
  } else if (allDone) {
    completeBtn.textContent = "🏆 Mark Workout Complete";
  } else {
    completeBtn.textContent = "Mark Complete Anyway";
    completeBtn.style.opacity = "0.7";
  }
  completeBtn.onclick = () => {
    const key = dayKey(state.currentWeek, state.currentDay);
    if (state.completed[key]) {
      delete state.completed[key];
    } else {
      state.completed[key] = true;
      showModal("Nice Work!", `Week ${w.week} ${day.name} complete! ${getCompletedCount() === getTotalWorkouts() ? "🎉 You finished the entire 8-week program! Time for the STKB Complex Program at kbmuscle.com/shop" : ""}`);
    }
    saveState();
    stopWorkoutTimer();
    renderAll();
  };
  workoutView.appendChild(completeBtn);

  // Cooldown reminder
  const cooldown = document.createElement("div");
  cooldown.className = "section";
  cooldown.innerHTML = `
    <h3>Cooldown</h3>
    <div class="notes-box">
      • Stretch<br>
      • Prone Deep Breathing — 5 min<br>
      • Foam Roll
    </div>
  `;
  workoutView.appendChild(cooldown);
}

function renderAll() {
  renderProgress();
  renderWeekTabs();
  renderDayGrid();
  renderWorkout();
}

// ============================================================
// WORKOUT TIMER (overall session timer)
// ============================================================
let workoutTimerInterval = null;
let workoutTimerStart = null;
let workoutTimerElapsed = 0;
let workoutTimerPaused = false;

function startWorkoutTimer() {
  if (workoutTimerInterval) return; // already running
  workoutTimerStart = Date.now();
  workoutTimerElapsed = 0;
  workoutTimerPaused = false;
  document.getElementById("workout-timer-bar").classList.remove("hidden");
  document.getElementById("wt-pause").textContent = "Pause";
  app.style.paddingTop = "60px";
  workoutTimerInterval = setInterval(() => {
    if (!workoutTimerPaused) {
      workoutTimerElapsed = Math.floor((Date.now() - workoutTimerStart) / 1000);
      document.getElementById("wt-time").textContent = formatTime(workoutTimerElapsed);
    }
  }, 1000);
}

function stopWorkoutTimer() {
  if (workoutTimerInterval) {
    clearInterval(workoutTimerInterval);
    workoutTimerInterval = null;
  }
  document.getElementById("workout-timer-bar").classList.add("hidden");
  app.style.paddingTop = "12px";
}

document.getElementById("wt-pause").onclick = () => {
  workoutTimerPaused = !workoutTimerPaused;
  document.getElementById("wt-pause").textContent = workoutTimerPaused ? "Resume" : "Pause";
  if (!workoutTimerPaused) {
    // adjust start time
    workoutTimerStart = Date.now() - workoutTimerElapsed * 1000;
  }
};
document.getElementById("wt-stop").onclick = () => {
  stopWorkoutTimer();
};

// ============================================================
// EXERCISE TIMERS (EMOM, Interval, Countdown, Rest)
// ============================================================
const timerDock = document.getElementById("timer-dock");
const timerDockContent = document.getElementById("timer-dock-content");
let activeTimer = null;

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function openTimer(config, exerciseName) {
  if (activeTimer) activeTimer.destroy();
  timerDock.classList.remove("hidden");

  const type = config.type;
  let html = `<div class="timer-row"><div class="timer-label">${exerciseName}</div></div>`;

  if (type === "emom") {
    html = `
      <div class="timer-row">
        <div class="timer-label">${exerciseName}</div>
      </div>
      <div class="emom-setup">
        <label>Minutes:</label>
        <input type="number" id="emom-min" value="${config.defaultMin || 10}" min="1" max="60" />
        <span class="emom-round-info" id="emom-info"></span>
      </div>
      <div class="timer-row">
        <div class="timer-label">Round</div>
        <div class="timer-display" id="emom-round">—</div>
        <div class="timer-controls">
          <button class="primary" id="emom-start">Start</button>
          <button id="emom-close">Close</button>
        </div>
      </div>
      <div class="timer-row">
        <div class="timer-label">Minute</div>
        <div class="timer-display work" id="emom-clock">00:00</div>
      </div>
    `;
    timerDockContent.innerHTML = html;

    let interval = null;
    let totalMin = config.defaultMin || 10;
    let currentRound = 0;
    let roundStart = 0;

    function updateInfo() {
      totalMin = parseInt(document.getElementById("emom-min").value) || 10;
      document.getElementById("emom-info").textContent = `${totalMin} rounds (1 min each)`;
    }
    updateInfo();
    document.getElementById("emom-min").oninput = updateInfo;

    function tick() {
      const elapsed = Math.floor((Date.now() - roundStart) / 1000);
      const remaining = 60 - elapsed;
      if (remaining <= 0) {
        currentRound++;
        if (currentRound >= totalMin) {
          finish();
          return;
        }
        roundStart = Date.now();
        document.getElementById("emom-round").textContent = `${currentRound + 1} / ${totalMin}`;
        document.getElementById("emom-clock").textContent = "01:00";
        beep();
      } else {
        document.getElementById("emom-clock").textContent = formatTime(remaining);
        if (remaining <= 3 && remaining > 0) beep(800, 0.1);
      }
    }

    function finish() {
      clearInterval(interval);
      interval = null;
      document.getElementById("emom-clock").textContent = "DONE";
      document.getElementById("emom-round").textContent = "Complete";
      document.getElementById("emom-start").textContent = "Restart";
      document.getElementById("emom-start").classList.remove("running");
      beep(1000, 0.5);
      vibrate([200, 100, 200, 100, 400]);
    }

    document.getElementById("emom-start").onclick = () => {
      if (interval) {
        clearInterval(interval);
        interval = null;
        document.getElementById("emom-start").textContent = "Start";
        document.getElementById("emom-start").classList.remove("running");
        return;
      }
      totalMin = parseInt(document.getElementById("emom-min").value) || 10;
      currentRound = 0;
      roundStart = Date.now();
      document.getElementById("emom-round").textContent = `1 / ${totalMin}`;
      document.getElementById("emom-clock").textContent = "01:00";
      document.getElementById("emom-start").textContent = "Stop";
      document.getElementById("emom-start").classList.add("running");
      beep();
      interval = setInterval(tick, 200);
    };

    document.getElementById("emom-close").onclick = () => closeTimer();

    activeTimer = {
      destroy() {
        if (interval) clearInterval(interval);
      }
    };

  } else if (type === "interval") {
    const totalRounds = config.rounds || 10;
    const restSec = config.restSec || 30;
    html = `
      <div class="timer-row">
        <div class="timer-label">${exerciseName}</div>
      </div>
      <div class="emom-setup">
        <label>Rounds:</label>
        <input type="number" id="int-rounds" value="${totalRounds}" min="1" max="100" />
        <label>Rest sec:</label>
        <input type="number" id="int-rest" value="${restSec}" min="5" max="120" />
      </div>
      <div class="timer-row">
        <div class="timer-label">Round</div>
        <div class="timer-display" id="int-round">—</div>
        <div class="timer-controls">
          <button class="primary" id="int-start">Start</button>
          <button id="int-close">Close</button>
        </div>
      </div>
      <div class="timer-row">
        <div class="timer-label" id="int-phase">Rest</div>
        <div class="timer-display rest" id="int-clock">00:30</div>
      </div>
    `;
    timerDockContent.innerHTML = html;

    let interval = null;
    let currentRound = 0;
    let phase = "rest"; // rest -> work (but here work is instant / manual)
    let phaseStart = 0;

    document.getElementById("int-start").onclick = () => {
      if (interval) {
        clearInterval(interval);
        interval = null;
        document.getElementById("int-start").textContent = "Start";
        document.getElementById("int-start").classList.remove("running");
        return;
      }
      const rounds = parseInt(document.getElementById("int-rounds").value) || totalRounds;
      const rest = parseInt(document.getElementById("int-rest").value) || restSec;
      currentRound = 0;
      phase = "rest";
      phaseStart = Date.now();
      document.getElementById("int-round").textContent = `1 / ${rounds}`;
      document.getElementById("int-phase").textContent = "Rest";
      document.getElementById("int-clock").textContent = formatTime(rest);
      document.getElementById("int-clock").className = "timer-display rest";
      document.getElementById("int-start").textContent = "Stop";
      document.getElementById("int-start").classList.add("running");
      beep();

      interval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - phaseStart) / 1000);
        const remaining = rest - elapsed;
        if (remaining <= 0) {
          currentRound++;
          if (currentRound >= rounds) {
            clearInterval(interval);
            interval = null;
            document.getElementById("int-clock").textContent = "DONE";
            document.getElementById("int-round").textContent = "Complete";
            document.getElementById("int-start").textContent = "Restart";
            document.getElementById("int-start").classList.remove("running");
            beep(1000, 0.5);
            vibrate([200, 100, 200, 100, 400]);
            return;
          }
          phaseStart = Date.now();
          document.getElementById("int-round").textContent = `${currentRound + 1} / ${rounds}`;
          document.getElementById("int-clock").textContent = formatTime(rest);
          beep();
        } else {
          document.getElementById("int-clock").textContent = formatTime(remaining);
          if (remaining <= 3 && remaining > 0) beep(800, 0.1);
        }
      }, 200);
    };

    document.getElementById("int-close").onclick = () => closeTimer();

    activeTimer = {
      destroy() { if (interval) clearInterval(interval); }
    };

  } else if (type === "countdown") {
    const totalSec = config.defaultSec || 600;
    html = `
      <div class="timer-row">
        <div class="timer-label">${exerciseName}</div>
      </div>
      <div class="emom-setup">
        <label>Minutes:</label>
        <input type="number" id="cd-min" value="${Math.floor(totalSec / 60)}" min="1" max="60" />
      </div>
      <div class="timer-row">
        <div class="timer-label">Remaining</div>
        <div class="timer-display work" id="cd-clock">${formatTime(totalSec)}</div>
        <div class="timer-controls">
          <button class="primary" id="cd-start">Start</button>
          <button id="cd-close">Close</button>
        </div>
      </div>
    `;
    timerDockContent.innerHTML = html;

    let interval = null;
    let startTime = null;
    let totalDur = totalSec;

    document.getElementById("cd-start").onclick = () => {
      if (interval) {
        clearInterval(interval);
        interval = null;
        document.getElementById("cd-start").textContent = "Start";
        document.getElementById("cd-start").classList.remove("running");
        return;
      }
      totalDur = (parseInt(document.getElementById("cd-min").value) || 10) * 60;
      startTime = Date.now();
      document.getElementById("cd-start").textContent = "Stop";
      document.getElementById("cd-start").classList.add("running");
      beep();

      interval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = totalDur - elapsed;
        if (remaining <= 0) {
          clearInterval(interval);
          interval = null;
          document.getElementById("cd-clock").textContent = "DONE";
          document.getElementById("cd-start").textContent = "Restart";
          document.getElementById("cd-start").classList.remove("running");
          beep(1000, 0.5);
          vibrate([200, 100, 200, 100, 400]);
          return;
        }
        document.getElementById("cd-clock").textContent = formatTime(remaining);
        if (remaining <= 3 && remaining > 0) beep(800, 0.1);
      }, 200);
    };

    document.getElementById("cd-close").onclick = () => closeTimer();

    activeTimer = {
      destroy() { if (interval) clearInterval(interval); }
    };

  } else if (type === "rest") {
    const defaultSec = config.defaultSec || 60;
    html = `
      <div class="timer-row">
        <div class="timer-label">${exerciseName}</div>
      </div>
      <div class="emom-setup">
        <label>Rest sec:</label>
        <input type="number" id="rest-sec" value="${defaultSec}" min="10" max="300" />
      </div>
      <div class="timer-row">
        <div class="timer-label">Rest</div>
        <div class="timer-display rest" id="rest-clock">${formatTime(defaultSec)}</div>
        <div class="timer-controls">
          <button class="primary" id="rest-start">Start</button>
          <button id="rest-close">Close</button>
        </div>
      </div>
    `;
    timerDockContent.innerHTML = html;

    let interval = null;

    document.getElementById("rest-start").onclick = () => {
      if (interval) {
        clearInterval(interval);
        interval = null;
        document.getElementById("rest-start").textContent = "Start";
        document.getElementById("rest-start").classList.remove("running");
        return;
      }
      const dur = parseInt(document.getElementById("rest-sec").value) || defaultSec;
      const startTime = Date.now();
      document.getElementById("rest-start").textContent = "Stop";
      document.getElementById("rest-start").classList.add("running");
      beep();

      interval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const remaining = dur - elapsed;
        if (remaining <= 0) {
          clearInterval(interval);
          interval = null;
          document.getElementById("rest-clock").textContent = "GO";
          document.getElementById("rest-start").textContent = "Start";
          document.getElementById("rest-start").classList.remove("running");
          beep(1000, 0.5);
          vibrate([200, 100, 200, 100, 400]);
          return;
        }
        document.getElementById("rest-clock").textContent = formatTime(remaining);
        if (remaining <= 3 && remaining > 0) beep(800, 0.1);
      }, 200);
    };

    document.getElementById("rest-close").onclick = () => closeTimer();

    activeTimer = {
      destroy() { if (interval) clearInterval(interval); }
    };
  }
}

function closeTimer() {
  if (activeTimer) {
    activeTimer.destroy();
    activeTimer = null;
  }
  timerDock.classList.add("hidden");
  timerDockContent.innerHTML = "";
}

// ============================================================
// AUDIO & VIBRATION
// ============================================================
let audioCtx = null;
function beep(freq = 600, duration = 0.15) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = "sine";
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showModal(title, text) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-text").textContent = text;
  document.getElementById("modal").classList.remove("hidden");
}
document.getElementById("modal-close").onclick = () => {
  document.getElementById("modal").classList.add("hidden");
};

// RESET
// ============================================================
document.getElementById("reset-btn").onclick = () => {
  if (confirm("Reset all progress? This cannot be undone.")) {
    state = {
      currentWeek: 0,
      currentDay: null,
      completed: {},
      exercises: {},
    };
    saveState();
    stopWorkoutTimer();
    closeTimer();
    renderAll();
  }
};

// ============================================================
// PWA: MANIFEST + SERVICE WORKER (inline via blob)
// ============================================================
const manifest = {
  name: "STKB Muscle Gain Tracker",
  short_name: "STKB Tracker",
  description: "8-week single kettlebell muscle gain program tracker",
  start_url: ".",
  display: "standalone",
  background_color: "#0d1117",
  theme_color: "#0d1117",
  icons: []
};

// Generate an inline icon
const iconCanvas = document.createElement("canvas");
iconCanvas.width = 192;
iconCanvas.height = 192;
const ictx = iconCanvas.getContext("2d");
ictx.fillStyle = "#f78166";
ictx.fillRect(0, 0, 192, 192);
ictx.fillStyle = "#fff";
ictx.font = "bold 80px sans-serif";
ictx.textAlign = "center";
ictx.textBaseline = "middle";
ictx.fillText("KB", 96, 96);
const iconDataUrl = iconCanvas.toDataURL("image/png");
manifest.icons = [
  { src: iconDataUrl, sizes: "192x192", type: "image/png" },
  { src: iconDataUrl, sizes: "512x512", type: "image/png" }
];

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
const manifestURL = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement("link");
manifestLink.rel = "manifest";
manifestLink.href = manifestURL;
document.head.appendChild(manifestLink);

// Service worker via blob (caches current page for offline use)
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "stkb-tracker-v1";
    self.addEventListener("install", (e) => {
      self.skipWaiting();
    });
    self.addEventListener("activate", (e) => {
      e.waitUntil(self.clients.claim());
    });
    self.addEventListener("fetch", (e) => {
      e.respondWith(
        caches.open(CACHE).then((cache) =>
          cache.match(e.request).then((cached) => {
            const fetchPromise = fetch(e.request).then((response) => {
              if (response && response.status === 200) {
                cache.put(e.request, response.clone());
              }
              return response;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        )
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: "application/javascript" });
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(() => {
    // SW registration may fail on some browsers with blob URL; that's ok
  });
}

// Install prompt
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("install-btn").style.display = "";
});
document.getElementById("install-btn").onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById("install-btn").style.display = "none";
  }
};

// ============================================================
// INIT
// ============================================================
loadState();
renderAll();

// Prevent page zoom on double tap (iOS)
let lastTouch = 0;
document.addEventListener("touchend", (e) => {
  const now = Date.now();
  if (now - lastTouch < 300) e.preventDefault();
  lastTouch = now;
}, { passive: false });

// Keep screen awake during workout (if supported)
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      wakeLock = await navigator.wakeLock.request("screen");
    }
  } catch (e) {}
}
requestWakeLock();
document.addEventListener("visibilitychange", () => {
  if (wakeLock !== null && document.visibilityState === "visible") {
    requestWakeLock();
  }
});
